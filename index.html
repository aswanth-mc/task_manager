<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>task_manager</title>
    <link rel="icon" href="./assets/image/logo.png" type="image/png">
</head>
<body>
    <main class="container">
        <header>
            <h1>Task Manager</h1>
            <!-- Navigation Tabs -->
            <nav class="tab-navigation">
                <button class="tab-btn active" data-tab="todo-section">Todo List</button>
                <button class="tab-btn" data-tab="learning-section">Learning Paths</button>
            </nav>
        </header>

        <!-- TODO SECTION -->
        <section id="todo-section" class="tab-section active">
            <form action="" id="task-form">
                <input type="text" id="task-input" placeholder="Add a new task" />
                <button type="submit" class="add-task-btn">Add Task</button>
            </form>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search tasks...">
                <button id="search-btn">Search</button>
            </div>
            <div id="task-counter"></div>
            <div id="filter">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <ul id="task-list"></ul>
        </section>

        <!-- LEARNING PATHS SECTION -->
        <section id="learning-section" class="tab-section">
            <form id="course-form">
                <input type="text" id="course-input" placeholder="Add a new course (e.g., Python, React, Kotlin)" />
                <button type="submit" class="add-course-btn">Create Course</button>
            </form>
            <div id="courses-container">
                <!-- Courses will be rendered here -->
            </div>
        </section>
    </main>
    <script src="./assets/js/script.js"></script>
</body> 
</html>
